name: Network Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

env:
  CARGO_TERM_COLOR: always

jobs:
  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --locked

      - name: Run CLI smoke test against a public target
        shell: bash
        run: |
          set -euo pipefail
          timeout 90s bash -lc "printf 'n\n' | cargo run --locked -- -t 1.1.1.1"
