name: Release

on:
  push:
    tags:
      - "*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-targets

      - name: Verify package
        run: cargo package --locked

      - name: Check publish dry run
        run: cargo publish --locked --dry-run

  build:
    name: Build release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: pantheon-probe-linux-x86_64
            archive_ext: tar.gz
            binary_path: target/release/pantheon-probe
          - os: macos-latest
            artifact_name: pantheon-probe-macos-x86_64
            archive_ext: tar.gz
            binary_path: target/release/pantheon-probe
          - os: windows-latest
            artifact_name: pantheon-probe-windows-x86_64
            archive_ext: zip
            binary_path: target/release/pantheon-probe.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            powershell -Command "Compress-Archive -Path '${{ matrix.binary_path }}' -DestinationPath 'dist/${{ matrix.artifact_name }}.zip'"
          else
            tar -C "$(dirname "${{ matrix.binary_path }}")" -czf "dist/${{ matrix.artifact_name }}.tar.gz" "$(basename "${{ matrix.binary_path }}")"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}

  publish-github-release:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.* 
