name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.metadata.outputs.should_release }}
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      title: ${{ steps.metadata.outputs.title }}
      notes: ${{ steps.metadata.outputs.notes }}
      previous_version: ${{ steps.metadata.outputs.previous_version }}
      version_bumped: ${{ steps.metadata.outputs.version_bumped }}
      has_releasable_changes: ${{ steps.metadata.outputs.has_releasable_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release metadata
        id: metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./.github/scripts/release-metadata.sh

      - name: Print release decision
        run: |
          echo "should_release=${{ steps.metadata.outputs.should_release }}"
          echo "version=${{ steps.metadata.outputs.version }}"
          echo "tag=${{ steps.metadata.outputs.tag }}"
          echo "title=${{ steps.metadata.outputs.title }}"
          echo "previous_version=${{ steps.metadata.outputs.previous_version }}"
          echo "version_bumped=${{ steps.metadata.outputs.version_bumped }}"
          echo "has_releasable_changes=${{ steps.metadata.outputs.has_releasable_changes }}"

  validate:
    name: Validate release
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-targets

      - name: Verify package
        run: cargo package --locked

      - name: Check publish dry run
        run: cargo publish --locked --dry-run

  build:
    name: Build release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs:
      - prepare
      - validate
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: pantheon-probe-linux-x86_64
            archive_ext: tar.gz
            binary_path: target/release/pantheon-probe
          - os: macos-latest
            artifact_name: pantheon-probe-macos-x86_64
            archive_ext: tar.gz
            binary_path: target/release/pantheon-probe
          - os: windows-latest
            artifact_name: pantheon-probe-windows-x86_64
            archive_ext: zip
            binary_path: target/release/pantheon-probe.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            powershell -Command "Compress-Archive -Path '${{ matrix.binary_path }}' -DestinationPath 'dist/${{ matrix.artifact_name }}.zip'"
          else
            tar -C "$(dirname "${{ matrix.binary_path }}")" -czf "dist/${{ matrix.artifact_name }}.tar.gz" "$(basename "${{ matrix.binary_path }}")"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.should_release == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish crate to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          crate_status="$(
            curl -fsS -o /tmp/pantheon-probe-crate.json -w "%{http_code}" \
              "https://crates.io/api/v1/crates/pantheon-probe/${version}" || true
          )"

          if [[ "$crate_status" == "200" ]]; then
            echo "pantheon-probe ${version} is already published on crates.io"
            exit 0
          fi

          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "CARGO_REGISTRY_TOKEN secret is required for automated crates.io publishing" >&2
            exit 1
          fi

          cargo publish --locked

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.tag }}"
          title="${{ needs.prepare.outputs.title }}"
          notes_file="$(mktemp)"

          cat >"$notes_file" <<'EOF'
          ${{ needs.prepare.outputs.notes }}
          EOF

          mapfile -t files < <(find dist -type f | sort)
          if (( ${#files[@]} == 0 )); then
            echo "no release artifacts were downloaded" >&2
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes-file "$notes_file"
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" \
              --title "$title" \
              --notes-file "$notes_file" \
              --target "$GITHUB_SHA"
          fi
